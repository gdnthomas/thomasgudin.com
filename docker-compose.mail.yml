# Serveur mail léger pour thomasgudin.com (Postfix + Dovecot + DKIM/DMARC).
# Réutilise les certificats Let's Encrypt déjà obtenus par Traefik (acme.json).
#
# Déploiement (sur le serveur, depuis /srv/thomasgudin.com) :
#   docker compose -f docker-compose.mail.yml up -d
#
# Voir docs/MAIL.md pour les prérequis DNS/PTR et la création des boîtes.

services:
  mailserver:
    # Astuce : épingler une version précise en prod (ex: :14.0.0) plutôt que :latest.
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail.thomasgudin.com
    restart: always
    env_file: mailserver.env
    # Ports mail exposés sur l'hôte (Traefik ne gère que le HTTP/HTTPS).
    ports:
      - "25:25"     # SMTP entrant (réception depuis les autres serveurs)
      - "465:465"   # Submission implicite TLS (envoi par tes clients)
      - "587:587"   # Submission STARTTLS (envoi par tes clients)
      - "143:143"   # IMAP STARTTLS
      - "993:993"   # IMAP implicite TLS
    volumes:
      - ./docker-data/dms/mail-data/:/var/mail/
      - ./docker-data/dms/mail-state/:/var/mail-state/
      - ./docker-data/dms/mail-logs/:/var/log/mail/
      - ./docker-data/dms/config/:/tmp/docker-mailserver/
      - /etc/localtime:/etc/localtime:ro
      # Certificats gérés par Traefik (volume ./letsencrypt monté dans le service traefik).
      - ./letsencrypt/acme.json:/etc/letsencrypt/acme.json:ro
    # SSL_TYPE=letsencrypt + acme.json => DMS extrait la certif de mail.thomasgudin.com.
    environment:
      - SSL_TYPE=letsencrypt
    # NET_ADMIN nécessaire pour Fail2Ban (désactivé par défaut dans mailserver.env).
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: "ss --listening --tcp | grep -P 'LISTEN.+:smtp' || exit 1"
      timeout: 3s
      retries: 0
    networks:
      - web

  # Service factice : sert uniquement à déclencher l'émission d'un certificat
  # Let's Encrypt pour mail.thomasgudin.com par Traefik (stocké dans acme.json).
  mail-cert:
    image: traefik/whoami:latest
    container_name: mail-cert
    restart: always
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.mailcert.entrypoints=websecure"
      - "traefik.http.routers.mailcert.rule=Host(`mail.thomasgudin.com`)"
      - "traefik.http.routers.mailcert.tls.certresolver=thomasgudintls"
      - "traefik.http.services.mailcert.loadbalancer.server.port=80"

networks:
  web:
    name: web
    external: true
